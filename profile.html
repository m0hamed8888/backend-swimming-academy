<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AquaFlow | ملفي الشخصي</title>
  <link rel="stylesheet" href="./assets/css/style.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
.page-wrap{min-height:100dvh;padding:78px 16px 100px;max-width:780px;margin:0 auto;position:relative;z-index:1}
.prof-card{background:var(--surf);backdrop-filter:blur(28px);border:1px solid var(--bdr);border-radius:var(--r-xl);padding:26px 20px;margin-bottom:18px;position:relative;overflow:hidden}
.prof-card::before{content:'';position:absolute;top:0;inset-inline:0;height:2px;background:var(--grad-ocean)}
.prof-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.prof-av{width:66px;height:66px;border-radius:50%;background:var(--grad-ocean);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-disp);font-size:1.7rem;font-weight:800;color:#fff;box-shadow:0 0 24px rgba(0,100,255,.4)}
.prof-name{font-family:var(--f-disp);font-size:1.2rem;font-weight:800}
.prof-user{font-size:.74rem;color:var(--ts);margin-top:3px}
.prof-since{font-size:.68rem;color:var(--tm);margin-top:3px;display:flex;align-items:center;gap:4px}
.prof-since svg{width:11px;height:11px;color:var(--cyan)}
.logout-btn{margin-right:auto;padding:7px 14px;border-radius:var(--r-full);font-size:.74rem;font-weight:700;color:var(--err);background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);transition:all var(--fast);display:flex;align-items:center;gap:5px}
.logout-btn:hover{background:rgba(255,77,109,.16)}
.logout-btn svg{width:12px;height:12px}
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.qs{text-align:center;padding:13px 8px;background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:var(--r-md);position:relative;overflow:hidden}
.qs::before{content:'';position:absolute;top:0;inset-inline:0;height:2px;background:var(--grad-ocean)}
.qs-v{font-family:var(--f-disp);font-size:1.7rem;font-weight:800;color:var(--cyan)}
.qs-l{font-size:.62rem;font-weight:600;color:var(--tm);margin-top:2px}
.join-info{display:flex;align-items:center;gap:8px;margin-top:14px;padding:9px 13px;border-radius:var(--r-md);background:rgba(255,255,255,.03);border:1px solid var(--bdr);font-size:.76rem;color:var(--ts)}
.join-info svg{width:13px;height:13px;color:var(--cyan);flex-shrink:0}

/* swimmer card */
.sw-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.sw-hd h2{font-family:var(--f-disp);font-size:1rem;font-weight:800;display:flex;align-items:center;gap:7px}
.sw-hd h2 svg{width:15px;height:15px;color:var(--cyan)}
.search-bar{position:relative;margin-bottom:14px}
.search-bar svg{position:absolute;right:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tm);pointer-events:none}
.search-bar input{width:100%;height:44px;padding:0 40px 0 14px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:var(--r-full);color:var(--tp);font-size:.84rem;outline:none;direction:rtl;transition:border-color var(--mid)}
.search-bar input:focus{border-color:rgba(0,200,255,.4)}
.search-bar input::placeholder{color:var(--tm)}
.sw-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;transition:all var(--fast) var(--ease);position:relative;overflow:hidden}
.sw-card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:var(--grad-ocean);transform:scaleY(0);transition:transform var(--mid) var(--ease);transform-origin:bottom}
.sw-card:hover{border-color:rgba(0,200,255,.22);transform:translateX(-4px)}
.sw-card:hover::before{transform:scaleY(1)}
.sw-top{display:flex;align-items:center;gap:11px;cursor:pointer}
.sw-av{width:42px;height:42px;border-radius:50%;background:var(--grad-ocean);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff}
.sw-name{font-weight:800;font-size:.9rem}
.sw-sub{font-size:.7rem;color:var(--cyan);margin-top:2px}
.sw-badge{margin-right:auto;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:var(--r-full)}
.b-on{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--ok)}
.b-off{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);color:var(--err)}
.sw-prog{margin-top:11px}
.sp-labels{display:flex;justify-content:space-between;font-size:.67rem;color:var(--tm);margin-bottom:4px}
.sp-bar-wrap{height:4px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
.sp-fill{height:100%;border-radius:4px;background:var(--grad-ocean);transition:width .7s var(--ease)}
.sw-expand{display:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--bdr);animation:fadeIn .22s ease}
.sw-expand.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.sw-details{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.sd{font-size:.71rem}
.sd-l{color:var(--tm)}
.sd-v{color:var(--tp);font-weight:600}
.detail-highlight{background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.12);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;font-size:.74rem;color:var(--ts);display:flex;align-items:center;gap:7px}
.detail-highlight svg{width:13px;height:13px;color:var(--cyan);flex-shrink:0}

/* ── RATING DISPLAY ── */
.rating-section{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:var(--r-md);padding:12px 14px;margin-bottom:12px}
.rating-title{font-size:.74rem;font-weight:700;color:var(--ts);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.rating-title svg{width:13px;height:13px;color:#ffd700}
.rating-stars{display:flex;gap:3px;direction:ltr}
.rs{font-size:1.4rem;color:rgba(255,255,255,.15)}
.rs.filled{color:#ffd700}
.rating-note{font-size:.72rem;color:var(--ts);margin-top:6px;font-style:italic}
.rating-by{font-size:.64rem;color:var(--tm);margin-top:3px}
.no-rating{font-size:.74rem;color:var(--tm);font-style:italic}

/* stars row for xp */
.exp-stars{display:flex;gap:2px;direction:ltr;margin-top:2px}
.exp-star{font-size:.9rem;color:rgba(255,255,255,.15)}
.exp-star.lit{color:#ffd700}

.sw-actions{display:flex;gap:6px;flex-wrap:wrap}
.sa-btn{padding:6px 12px;border-radius:var(--r-full);font-size:.7rem;font-weight:700;display:inline-flex;align-items:center;gap:4px;transition:all var(--fast)}
.sa-btn svg{width:11px;height:11px}
.sa-edit{color:var(--warn);background:rgba(255,181,71,.07);border:1px solid rgba(255,181,71,.22)}
.sa-edit:hover{background:rgba(255,181,71,.15)}
.no-data{text-align:center;padding:48px 20px;color:var(--tm)}
.no-data svg{width:40px;height:40px;margin:0 auto 12px;display:block;opacity:.3}
.no-data p{font-size:.85rem;margin-bottom:16px}

/* edit modal */
.mo{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity var(--mid)}
.mo.show{opacity:1;pointer-events:all}
.mo-card{width:100%;max-width:460px;background:#080e1c;border:1px solid var(--bdr);border-radius:var(--r-xl);padding:24px 20px;max-height:88dvh;overflow-y:auto;position:relative;transform:translateY(16px);transition:transform var(--mid) var(--ease)}
.mo.show .mo-card{transform:translateY(0)}
.mo-card::before{content:'';position:absolute;top:0;inset-inline:0;height:2px;background:var(--grad-ocean);border-radius:var(--r-xl) var(--r-xl) 0 0}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mo-title{font-family:var(--f-disp);font-size:.98rem;font-weight:800;display:flex;align-items:center;gap:7px}
.mo-title svg{width:14px;height:14px;color:var(--cyan)}
.mo-close{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--ts);transition:all var(--fast)}
.mo-close:hover{background:rgba(255,77,109,.15);color:var(--err)}
.mo-close svg{width:12px;height:12px}
.btn-save{width:100%;height:48px;border-radius:var(--r-md);background:var(--grad-ocean);color:#fff;font-size:.9rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(0,100,255,.36);margin-top:14px;transition:transform var(--fast) var(--spring),box-shadow var(--fast)}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,100,255,.52)}
.btn-save.loading{opacity:.6;pointer-events:none}
  </style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<nav class="top-nav">
  <a href="index.html" class="nav-brand ripple-btn"><i data-lucide="waves"></i><span>AquaFlow</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-link ripple-btn"><i data-lucide="home" style="width:13px;height:13px;vertical-align:middle;margin-left:3px"></i>الرئيسية</a>
  </div>
</nav>

<div class="page-wrap">
  <!-- Profile card -->
  <div class="prof-card">
    <div class="prof-top">
      <div class="prof-av" id="profAv">س</div>
      <div>
        <div class="prof-name" id="profName">—</div>
        <div class="prof-user" id="profUser">—</div>
        <div class="prof-since"><i data-lucide="calendar"></i><span id="profSince">—</span></div>
      </div>
      <button class="logout-btn" id="logoutBtn"><i data-lucide="log-out"></i> خروج</button>
    </div>
    <div class="qstats">
      <div class="qs"><div class="qs-v" id="qsTotal">—</div><div class="qs-l">سباحون مسجّلون</div></div>
      <div class="qs"><div class="qs-v" id="qsActive">—</div><div class="qs-l">اشتراك نشط</div></div>
      <div class="qs"><div class="qs-v" id="qsDays">—</div><div class="qs-l">يوم معنا</div></div>
    </div>
    <div class="join-info"><i data-lucide="calendar"></i><span id="joinText">عضو في AquaFlow</span></div>
  </div>

  <!-- Swimmers -->
  <div class="sw-hd">
    <h2><i data-lucide="users"></i> السباحون على حسابك</h2>
    <a href="register-swimmer.html" class="btn-outline ripple-btn" style="font-size:.76rem">
      <i data-lucide="plus" style="width:12px;height:12px"></i> إضافة سباح
    </a>
  </div>

  <div class="search-bar">
    <i data-lucide="search"></i>
    <input type="text" id="swSearch" placeholder="ابحث بالاسم أو رقم الاشتراك..."/>
  </div>

  <div id="swList">
    <div class="no-data"><i data-lucide="loader" style="animation:spin .8s linear infinite"></i><p>جاري التحميل...</p></div>
  </div>
</div>

<nav class="bottom-nav glass-panel">
  <a href="index.html" class="nav-icon ripple-btn"><i data-lucide="home"></i></a>
  <a href="register-swimmer.html" class="nav-icon center-plus ripple-btn"><i data-lucide="plus"></i></a>
  <a href="profile.html" class="nav-icon ripple-btn active"><i data-lucide="user"></i></a>
</nav>

<!-- EDIT MODAL (swimmer info only — no account edit) -->
<div class="mo" id="editModal">
  <div class="mo-card">
    <div class="mo-hd">
      <div class="mo-title"><i data-lucide="pencil"></i> تعديل بيانات السباح</div>
      <button class="mo-close" id="closeEdit"><i data-lucide="x"></i></button>
    </div>
    <div class="form-grid form-grid-2" style="gap:12px">
      <div class="field"><label>الاسم</label><input type="text" class="fc" id="e_name"/></div>
      <div class="field"><label>الهاتف</label><input type="text" class="fc" id="e_phone"/></div>
      <div class="field"><label>وقت التدريب</label>
        <select class="fc" id="e_time">
          <option value="">بدون</option>
          <option>06:00 ص</option><option>07:00 ص</option><option>08:00 ص</option>
          <option>09:00 ص</option><option>10:00 ص</option>
          <option>04:00 م</option><option>05:00 م</option><option>06:00 م</option><option>07:00 م</option>
        </select></div>
      <div class="field"><label>الهدف</label>
        <select class="fc" id="e_goal">
          <option value="">—</option>
          <option value="fitness">اللياقة البدنية</option>
          <option value="competition">المنافسات</option>
          <option value="safety">الأمان في الماء</option>
          <option value="fun">الترفيه والمتعة</option>
        </select></div>
      <div class="field"><label>انتهاء الاشتراك</label>
        <input type="date" class="fc" id="e_expiry"/></div>
    </div>
    <button class="btn-save" id="saveBtn"><i data-lucide="save"></i><span id="saveTxt">حفظ التعديلات</span></button>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const API    = 'http://localhost:5000/api';
const GOALS  = {fitness:'اللياقة البدنية',competition:'المنافسات',safety:'الأمان في الماء',fun:'الترفيه'};
const DAYS   = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const STAR_LABELS=['','مبتدئ','مبتدئ متوسط','جيد','جيد جداً','ممتاز'];

let token=null, user=null, swimmers=[], editId=null;

document.addEventListener('DOMContentLoaded',()=>{
  lucide.createIcons();
  token=localStorage.getItem('sw_token');
  if(!token){window.location.href='auth.html';return;}
  try{user=JSON.parse(localStorage.getItem('sw_user'));}catch(e){}
  renderHero(); loadSwimmers(); bindUI();
});

function renderHero(){
  if(!user) return;
  const name=user.displayName||'', uname=user.username||'';
  document.getElementById('profAv').textContent=(name||uname).charAt(0).toUpperCase();
  document.getElementById('profName').textContent=name||uname;
  document.getElementById('profUser').textContent='@'+uname;
  const created=user.createdAt?new Date(user.createdAt):null;
  if(created){
    const days=Math.floor((Date.now()-created.getTime())/(1000*60*60*24));
    document.getElementById('profSince').textContent=`انضم في ${created.getDate()} ${MONTHS[created.getMonth()]} ${created.getFullYear()}`;
    document.getElementById('qsDays').textContent=days||'<1';
    document.getElementById('joinText').textContent=`عضو منذ ${created.getDate()} ${MONTHS[created.getMonth()]} ${created.getFullYear()}`;
  }
}

async function loadSwimmers(){
  try{
    const d=await apiCall('/swimmer-auth/my-swimmers');
    swimmers=d.swimmers||[];
    document.getElementById('qsTotal').textContent=swimmers.length;
    document.getElementById('qsActive').textContent=swimmers.filter(s=>s.isActive).length;
    render(''); lucide.createIcons();
  }catch(e){
    document.getElementById('swList').innerHTML=`<div class="no-data"><i data-lucide="wifi-off"></i><p>${e.message}</p></div>`;
    lucide.createIcons();
  }
}

function render(q=''){
  let data=[...swimmers];
  if(q){const lq=q.toLowerCase();data=data.filter(s=>s.fullName?.toLowerCase().includes(lq)||s.subscriptionId?.toLowerCase().includes(lq));}
  const list=document.getElementById('swList');
  if(!data.length){
    list.innerHTML=`<div class="no-data"><i data-lucide="users"></i><p>${q?`لا نتائج لـ "${q}"`:' لا يوجد سباحون مضافون بعد'}</p><a href="register-swimmer.html" class="btn-outline ripple-btn" style="font-size:.78rem"><i data-lucide="plus" style="width:12px;height:12px"></i> أضف الآن</a></div>`;
    lucide.createIcons();return;
  }
  list.innerHTML=data.map(s=>card(s)).join('');
  lucide.createIcons();
}

function card(s){
  const att=s.sessionsAttended||0,tot=s.sessionsCount||1;
  const pct=Math.min(100,Math.round((att/tot)*100));
  const days=(s.trainingDays||[]).map(d=>DAYS[d]).join('، ')||'—';
  const expiry=s.subscriptionExpiry?fmtDate(s.subscriptionExpiry):'—';
  const start=s.subscriptionStart?new Date(s.subscriptionStart):null;
  const daysSince=start?Math.floor((Date.now()-start.getTime())/(1000*60*60*24)):null;
  const sinceStr=start?`انضم ${fmtDate(s.subscriptionStart)}${daysSince!==null?' · منذ '+daysSince+' يوم':''}`:  '—';

  // خبرة سابقة — نجوم
  const expStars=s.starsCount?[1,2,3,4,5].map(i=>`<span class="exp-star${i<=s.starsCount?' lit':''}">★</span>`).join(''):'';

  // تقييم الكابتن
  let ratingHtml='<div class="no-rating">لم يُضَف تقييم بعد</div>';
  if(s.rating && s.rating > 0){
    const stars=[1,2,3,4,5].map(i=>`<span class="rs${i<=s.rating?' filled':''}">★</span>`).join('');
    ratingHtml=`
      <div class="rating-stars">${stars}</div>
      ${s.ratingNote?`<div class="rating-note">"${s.ratingNote}"</div>`:''}
      ${s.ratingUpdatedBy?`<div class="rating-by">بواسطة: ${s.ratingUpdatedBy} ${s.ratingUpdatedAt?'· '+fmtDate(s.ratingUpdatedAt):''}</div>`:''}`;
  }

  return `
  <div class="sw-card">
    <div class="sw-top" onclick="toggle(this.closest('.sw-card'))">
      <div class="sw-av">${(s.fullName||'?').charAt(0)}</div>
      <div style="flex:1;min-width:0">
        <div class="sw-name">${s.fullName}</div>
        <div class="sw-sub">#${s.subscriptionId}${s.trainingTime?' · '+s.trainingTime:''}</div>
      </div>
      <span class="sw-badge ${s.isActive?'b-on':'b-off'}">${s.isActive?'● نشط':'● منتهي'}</span>
    </div>
    <div class="sw-prog">
      <div class="sp-labels"><span>الحضور: ${att}/${tot}</span><span>${pct}%</span></div>
      <div class="sp-bar-wrap"><div class="sp-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sw-expand">
      <div class="detail-highlight">
        <i data-lucide="calendar-check"></i><span>${sinceStr}</span>
      </div>
      <!-- تقييم الكابتن -->
      <div class="rating-section">
        <div class="rating-title"><i data-lucide="star"></i> تقييم الكابتن</div>
        ${ratingHtml}
      </div>
      <div class="sw-details">
        <div class="sd"><span class="sd-l">العمر: </span><span class="sd-v">${s.age??'—'} سنة</span></div>
        <div class="sd"><span class="sd-l">الهدف: </span><span class="sd-v">${GOALS[s.goal]||'—'}</span></div>
        <div class="sd"><span class="sd-l">أيام التدريب: </span><span class="sd-v">${days}</span></div>
        <div class="sd"><span class="sd-l">انتهاء الاشتراك: </span><span class="sd-v">${expiry}</span></div>
        <div class="sd"><span class="sd-l">الهاتف: </span><span class="sd-v">${s.phone||'—'}</span></div>
        <div class="sd"><span class="sd-l">الكابتن: </span><span class="sd-v">${s.trainerName||'—'}</span></div>
        ${s.starsCount?`<div class="sd" style="grid-column:1/-1"><span class="sd-l">مستوى خبرة سابقة: </span><div class="exp-stars">${expStars}</div></div>`:''}
      </div>
      <div class="sw-actions">
        <button class="sa-btn sa-edit ripple-btn" onclick="event.stopPropagation();openEdit('${s.subscriptionId}')">
          <i data-lucide="pencil"></i> تعديل البيانات
        </button>
      </div>
    </div>
  </div>`;
}

function toggle(card){card.querySelector('.sw-expand').classList.toggle('open');lucide.createIcons();}

function bindUI(){
  document.getElementById('logoutBtn').onclick=doLogout;
  let st;
  document.getElementById('swSearch').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>render(e.target.value.trim()),300);});
  document.getElementById('closeEdit').onclick=()=>closeModal('editModal');
  document.getElementById('editModal').addEventListener('click',e=>e.target===e.currentTarget&&closeModal('editModal'));
  document.getElementById('saveBtn').onclick=doSave;
}

function doLogout(){
  localStorage.removeItem('sw_token');localStorage.removeItem('sw_user');
  window.location.href='auth.html';
}

async function openEdit(subId){
  try{
    const d=await apiCall('/swimmers/'+subId);
    const s=d.data; editId=subId;
    document.getElementById('e_name').value=s.fullName||'';
    document.getElementById('e_phone').value=s.phone||'';
    document.getElementById('e_time').value=s.trainingTime||'';
    document.getElementById('e_goal').value=s.goal||'';
    document.getElementById('e_expiry').value=s.subscriptionExpiry?new Date(s.subscriptionExpiry).toISOString().split('T')[0]:'';
    openModal('editModal');lucide.createIcons();
  }catch(e){toast(e.message||'خطأ','er');}
}

async function doSave(){
  if(!editId) return;
  const btn=document.getElementById('saveBtn');
  btn.classList.add('loading');document.getElementById('saveTxt').textContent='جاري الحفظ...';
  try{
    const r=await fetch(`${API}/swimmers/${editId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify({
        fullName:document.getElementById('e_name').value.trim(),
        phone:document.getElementById('e_phone').value.trim(),
        trainingTime:document.getElementById('e_time').value||'',
        goal:document.getElementById('e_goal').value||'',
        subscriptionExpiry:document.getElementById('e_expiry').value||'',
      }),
    }).then(x=>x.json());
    if(!r.success) throw new Error(r.message);
    closeModal('editModal'); toast('✅ تم التحديث','ok');
    await loadSwimmers();
  }catch(e){toast(e.message||'خطأ','er');}
  finally{btn.classList.remove('loading');document.getElementById('saveTxt').textContent='حفظ التعديلات';lucide.createIcons();}
}

async function apiCall(path,method='GET',body=null){
  const h={'Content-Type':'application/json','Authorization':`Bearer ${token}`};
  const o={method,headers:h};if(body)o.body=JSON.stringify(body);
  const r=await fetch(`${API}${path}`,o);
  const d=await r.json().catch(()=>({message:`HTTP ${r.status}`}));
  if(!r.ok){if(r.status===401)doLogout();throw new Error(d.message||`HTTP ${r.status}`);}
  return d;
}
function fmtDate(d){const dt=new Date(d);return `${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');if(id==='editModal')editId=null;}
let toastT;
function toast(msg,type='inf'){const el=document.getElementById('toast');el.className=`toast ${type} show`;document.getElementById('toastMsg').textContent=msg;clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3200);}
</script>
